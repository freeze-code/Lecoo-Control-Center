arg_charge_limit_long_help: |
  Установить режим ограничения заряда батареи (FlexiCharger).

  Доступные режимы:
    - full:     Полная емкость (заряд до 100%)
    - high:     Высокая емкость (заряд до 95%)
    - balanced: Сбалансированный режим (заряд до 80%)
    - lifespan: Максимальный срок службы (заряд до 60%)
    - desk:     Настольный режим (заряд до 40%)

