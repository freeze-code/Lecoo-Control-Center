arg_charge_limit_long_help: |
  设置电池充电限制模式（FlexiCharger）。

  可用模式：
    - full:     全容量（100%）
    - high:     高容量（95%）
    - balanced: 平衡模式（80%）
    - lifespan: 最大电池寿命（60%）
    - desk:     桌面模式（40%）

